# Example deployment: an Ichoi satellite output node.
#
#   ICHOI_CORE_ADDR=ichoi.example.com:4043 \
#   ICHOI_CORE_KEYS='sha256:...' \
#   ICHOI_NODE_TOKEN='...' \
#   docker compose -f deploy/docker-compose.satellite.yml up -d
#
# Satellites do not mount a music library. They connect out to one core, register
# local audio outputs, and receive control/media over that outbound connection.

services:
  ichoi-satellite:
    image: containers.catalystsquad.com/public/catalystcommunity/ichoi:latest
    restart: unless-stopped
    environment:
      ICHOI_ROLE: satellite
      ICHOI_CORE_ADDR: ${ICHOI_CORE_ADDR}
      ICHOI_CORE_KEYS: ${ICHOI_CORE_KEYS}
      ICHOI_NODE_TOKEN: ${ICHOI_NODE_TOKEN}
      ICHOI_LOG: info
    devices:
      # ALSA output on Linux hosts. Remove or adjust for non-ALSA hosts.
      - /dev/snd:/dev/snd
    group_add:
      - audio
