# Secret grants for the ichoi project (record of what is applied on the coordinator).
#
#   reactorcide secret-grants apply --file .reactorcide/secret-grants.yaml \
#     --api-url https://reactorcide.catalystsquad.com --token <admin-token>
#
# A worker may always read its own job-scoped secrets, but reading these SHARED org paths
# (catalystcommunity/ci, catalystcommunity/registry) requires a grant — without one the
# worker DENIES the read and the job fails at secret resolution. Job names are the bare
# job `name:` fields (the coordinator scopes the match by project).
apiVersion: reactorcide.catalystcommunity.io/v1alpha1
kind: SecretGrantList
items:
  - metadata:
      name: ichoi-release-ci
    spec:
      scope:
        project: github.com/catalystcommunity/ichoi
      secret:
        path: catalystcommunity/ci
        match: exact
      subject:
        jobName:
          value: ichoi-release
          match: exact
      description: "release: githubpat for version bump + GitHub release"

  - metadata:
      name: ichoi-deploy-registry
    spec:
      scope:
        project: github.com/catalystcommunity/ichoi
      secret:
        path: catalystcommunity/registry
        match: exact
      subject:
        jobName:
          value: ichoi-server-build-and-deploy
          match: exact
      description: "deploy: push multi-arch images"
