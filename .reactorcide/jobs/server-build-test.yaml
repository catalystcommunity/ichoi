name: ichoi-server-build-test
description: "Verify the ichoi server Docker image builds successfully on PR"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include: ["server/crates/**", "server/Cargo.toml", "server/Cargo.lock", "server/web/**", "server/schema/**", "server/generated/**", "server/Dockerfile", "server/.dockerignore"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash ${REACTORCIDE_CODE_DIR:-/job/src}/.reactorcide/jobs/scripts/server-build-test.sh"
  timeout: 3600
  capabilities:
    - builder
  run_as:
    user: runner
