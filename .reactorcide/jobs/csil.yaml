name: ichoi-csil
description: "Validate the CSIL schema and verify the checked-in generated server code is current"
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    set -e
    sudo apt-get update && sudo apt-get install -y --no-install-recommends \
      pkg-config build-essential git

    export HOME=/home/runner
    export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"

    if ! command -v cargo >/dev/null 2>&1; then
      curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    fi

    if [ -f "$HOME/.cargo/env" ]; then
      . "$HOME/.cargo/env"
    elif [ -f /usr/local/cargo/env ]; then
      . /usr/local/cargo/env
    fi

    # tools.sh is repo-level tooling at the root; it drives the server target under server/.
    cd "${REACTORCIDE_CODE_DIR:-/job/src}"
    export CARGO_TARGET_DIR="${CARGO_TARGET_DIR:-/tmp/ichoi-target}"

    # tools.sh resolves csilgen from PATH, else from a sibling checkout at
    # CSILGEN_REPO. CI has no sibling repo, so clone csilgen and point at it.
    # rust-server generation does not need the WASM client generators.
    if ! command -v csilgen >/dev/null 2>&1; then
      echo "=== Cloning csilgen ==="
      git clone --depth 1 https://github.com/catalystcommunity/csilgen.git /tmp/csilgen
      export CSILGEN_REPO=/tmp/csilgen

      # csilgen loads code generators as WASM plugins from ~/.csilgen/generators/. A fresh
      # clone ships none; build + install just the Rust server generator (all gen-server
      # needs). Use csilgen's own target dir, not the job-wide CARGO_TARGET_DIR.
      echo "=== Installing the Rust server generator (wasm) ==="
      rustup target add wasm32-unknown-unknown
      ( cd /tmp/csilgen && CARGO_TARGET_DIR=/tmp/csilgen/target \
        cargo build --release --target wasm32-unknown-unknown --package csilgen-rust-generator )
      mkdir -p "$HOME/.csilgen/generators"
      cp /tmp/csilgen/target/wasm32-unknown-unknown/release/csilgen_rust_generator.wasm \
        "$HOME/.csilgen/generators/"
    fi

    echo "=== Validating CSIL schema ==="
    ./tools.sh csil-validate

    echo "=== Regenerating the Rust server bindings ==="
    ./tools.sh gen-server

    echo "=== Verifying generated server code is current ==="
    if ! git diff --exit-code -- server/generated/rust-server; then
      echo ""
      echo "Generated server code is stale. Run './tools.sh gen-server' and commit the result."
      echo "Generated code is never hand-edited (see CONTRIBUTING.md)."
      exit 1
    fi

    echo "=== CSIL schema valid and generated code current ==="
  timeout: 1200
  priority: 10
  run_as:
    user: runner
run_local:
  as_runner: true
